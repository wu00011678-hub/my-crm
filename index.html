<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>房地產 CRM — Carl Wu</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#F4F2ED;--sb:#0C1A10;--pri:#1D9E75;--pdk:#0F6E56;--plt:#E1F5EE;--acc:#EF9F27;--card:#fff;--t1:#111827;--t2:#4B5563;--t3:#9CA3AF;--bd:#E5E1D8;--sh:0 1px 3px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.07);--shh:0 6px 20px rgba(0,0,0,.1),0 16px 48px rgba(0,0,0,.13);--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden;font-size:14px}
/* SIDEBAR */
.sb{width:208px;min-width:208px;background:var(--sb);display:flex;flex-direction:column;padding:18px 0;height:100vh}
.sb-logo{padding:0 16px 18px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:6px}
.sb-icon{width:34px;height:34px;background:var(--pri);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}
.sb-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:#F9FAFB}
.sb-sub{font-size:10.5px;color:rgba(255,255,255,.25);margin-top:1px}
.nav{flex:1;padding:3px 8px}
.ni{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.4);cursor:pointer;margin-bottom:2px;transition:all .16s;font-size:12.5px;position:relative;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);transform:translateX(2px)}
.ni.on{background:rgba(29,158,117,.18);color:#6EE7B7;font-weight:500}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--pri);border-radius:0 3px 3px 0}
.ni-cnt{margin-left:auto;background:rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:10px;padding:1px 5px;border-radius:20px}
.ni.on .ni-cnt{background:rgba(110,231,183,.15);color:#6EE7B7}
.ni-alert{background:rgba(239,159,39,.2);color:var(--acc)}
.sb-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06)}
.sync{display:flex;align-items:center;gap:6px;font-size:10.5px;color:rgba(255,255,255,.25);cursor:pointer;transition:color .15s}
.sync:hover{color:rgba(255,255,255,.5)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--pri);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 22px 0;display:flex;align-items:center;gap:8px}
.pg-title{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;flex:1}
.srch-wrap{position:relative}
.srch{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:6px 10px 6px 28px;font-size:12.5px;width:170px;outline:none;transition:all .2s;font-family:'DM Sans',sans-serif;color:var(--t1)}
.srch:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(29,158,117,.1);width:200px}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.icn-btn{width:30px;height:30px;border-radius:7px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .16s;font-size:13px;color:var(--t2)}
.icn-btn:hover{border-color:var(--pri);color:var(--pri);background:var(--plt)}
.icn-btn:active{transform:scale(.9)}
.add-btn{padding:6px 13px;border-radius:8px;background:var(--pri);color:#fff;border:none;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .16s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.add-btn:hover{background:var(--pdk)}
.add-btn:active{transform:scale(.96)}
.sec-btn{padding:6px 13px;border-radius:8px;background:var(--card);color:var(--t2);border:1px solid var(--bd);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .16s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.sec-btn:hover{border-color:var(--pri);color:var(--pri)}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:10px 22px 22px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.page{display:none}.page.on{display:block}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.kpi{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shh)}
.kpi-lbl{font-size:10px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:600;line-height:1}
.kpi-note{font-size:10.5px;color:var(--t3);margin-top:4px}
.kpi.green{background:var(--pri);border-color:var(--pdk)}
.kpi.green .kpi-lbl,.kpi.green .kpi-note{color:rgba(255,255,255,.55)}
.kpi.green .kpi-val{color:#fff}
/* ALERTS */
.alert-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r);padding:10px 14px;margin-bottom:12px}
.alert-title{font-size:11px;font-weight:600;color:#92400E;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.alert-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#92400E;padding:3px 0;border-bottom:1px solid rgba(253,230,138,.5);cursor:pointer}
.alert-item:last-child{border-bottom:none}
.alert-item:hover{color:#78350F}
/* KANBAN */
.kanban-wrap{overflow-x:auto;padding-bottom:8px}
.kanban{display:flex;gap:8px;min-width:max-content}
.kb-col{width:188px;background:rgba(0,0,0,.03);border-radius:10px;padding:10px}
.kb-hd{font-size:11.5px;font-weight:600;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kb-cnt{background:var(--pri);color:#fff;border-radius:20px;font-size:10px;padding:1px 6px;font-weight:600}
.kb-card{background:var(--card);border-radius:8px;padding:9px 11px;margin-bottom:6px;cursor:pointer;border:1px solid var(--bd);transition:all .18s}
.kb-card:hover{transform:translateY(-2px);box-shadow:var(--shh);border-color:rgba(29,158,117,.2)}
.kb-name{font-family:'Noto Serif TC',serif;font-size:12.5px;font-weight:600;margin-bottom:4px}
.kb-info{font-size:11px;color:var(--t3);line-height:1.5}
/* SECTION */
.sec-hd{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.sec-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600}
.sec-cnt{font-size:10.5px;color:var(--t3);background:var(--bg);border:1px solid var(--bd);border-radius:20px;padding:1px 7px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap}
.tab{padding:4px 11px;border-radius:7px;font-size:12px;border:1px solid var(--bd);background:var(--card);color:var(--t2);cursor:pointer;transition:all .14s;user-select:none}
.tab:hover{border-color:var(--pri);color:var(--pri)}
.tab.on{background:var(--pri);border-color:var(--pri);color:#fff}
.tab:active{transform:scale(.95)}
/* CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px}
.cc{background:var(--card);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .2s;cursor:pointer;position:relative}
.cc:hover{transform:translateY(-3px);box-shadow:var(--shh);border-color:rgba(29,158,117,.18)}
.edit-hint{position:absolute;top:8px;right:8px;font-size:9.5px;color:var(--t3);background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:1px 5px;opacity:0;transition:opacity .18s}
.cc:hover .edit-hint,.pc:hover .edit-hint{opacity:1}
.c-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;flex-shrink:0}
.c-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:600;line-height:1.3}
.c-id{font-size:9.5px;color:var(--t3);margin-top:1px;font-family:'DM Sans',sans-serif}
.divid{height:1px;background:var(--bd);margin-bottom:8px;opacity:.6}
.crow{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:11.5px}
.crow-ico{color:var(--t3);width:13px;text-align:center;font-size:11px}
.crow-lbl{color:var(--t3);min-width:32px}
.crow-val{color:var(--t2);font-weight:500}
.stage-bar{height:3px;background:var(--bd);border-radius:2px;margin-top:9px;overflow:hidden}
.stage-fill{height:100%;background:var(--pri);border-radius:2px;transition:width .6s}
.stage-txt{font-size:10px;color:var(--t3);margin-top:3px;display:flex;justify-content:space-between}
/* BADGES */
.bdg{font-size:10px;font-weight:500;padding:2px 6px;border-radius:20px;white-space:nowrap;display:inline-block}
.b-buy{background:#EFF6FF;color:#1D4ED8}.b-sell{background:#FFF7ED;color:#C2410C}
.b-rent{background:#F0FDF4;color:#15803D}.b-land{background:#FAF5FF;color:#7C3AED}
.b-inv{background:#FFF1F2;color:#BE123C}
.b-q{background:#F3F4F6;color:#6B7280}.b-v{background:#EFF6FF;color:#1D4ED8}
.b-n{background:#FFFBEB;color:#B45309}.b-s{background:#F0FDF4;color:#15803D}
.b-d{background:#DCFCE7;color:#14532D}.b-p{background:#F9FAFB;color:#9CA3AF}
.b-own{background:#E0F2FE;color:#0369A1}.b-grp{background:#FAF5FF;color:#7C3AED}
.b-list{background:#EFF6FF;color:#1D4ED8}.b-sold{background:#DCFCE7;color:#14532D}
.b-rented{background:#FAF5FF;color:#7C3AED}.b-rm{background:#F3F4F6;color:#9CA3AF}
.tag{font-size:10.5px;padding:1px 6px;border-radius:4px;border:1px solid var(--bd);color:var(--t2);background:var(--bg)}
/* PROPERTY CARDS */
.pc{background:var(--card);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .2s;cursor:pointer;position:relative}
.pc:hover{transform:translateY(-3px);box-shadow:var(--shh)}
.p-addr{font-family:'Noto Serif TC',serif;font-size:12.5px;font-weight:600;line-height:1.45;margin-bottom:7px}
.p-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.chip{font-size:11px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;padding:2px 7px;color:var(--t2)}
.p-price{font-size:18px;font-weight:600;color:var(--pdk)}
.p-unit{font-size:11px;color:var(--t3);font-weight:400}
/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.46);display:none;align-items:center;justify-content:center;z-index:1000}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px 24px 20px;width:520px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.22)}
.modal-wide{width:820px}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700}
.modal-close{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:13px;transition:all .14s;background:var(--bg);border:none}
.modal-close:hover{background:var(--bd);color:var(--t1)}
.f-row{margin-bottom:11px}
.f-row label{display:block;font-size:10.5px;font-weight:500;color:var(--t2);margin-bottom:4px;letter-spacing:.03em}
.f-row input,.f-row select,.f-row textarea{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:7px;font-size:12.5px;color:var(--t1);background:var(--bg);outline:none;transition:all .16s;font-family:'DM Sans',sans-serif;appearance:none}
.f-row input:focus,.f-row select:focus,.f-row textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(29,158,117,.1);background:#fff}
.f-row textarea{resize:vertical;min-height:60px}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.f-actions{display:flex;gap:6px;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd)}
.f-left{display:flex;gap:6px}
.btn{padding:7px 15px;border-radius:7px;font-size:12.5px;cursor:pointer;transition:all .14s;font-family:'DM Sans',sans-serif;border:1px solid var(--bd)}
.btn-cancel{background:var(--bg);color:var(--t2)}.btn-cancel:hover{border-color:var(--t3);color:var(--t1)}
.btn-del{background:#FEF2F2;color:#991B1B;border-color:#FECACA}.btn-del:hover{background:#FEE2E2}
.btn-save{background:var(--pri);color:#fff;border-color:var(--pdk);font-weight:500}.btn-save:hover{background:var(--pdk)}
.btn-save:active,.btn-cancel:active,.btn-del:active{transform:scale(.96)}
.btn-save:disabled{opacity:.55;cursor:not-allowed;transform:none}
/* PDF MODAL */
.pdf-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pdf-panel{background:var(--bg);border-radius:8px;padding:12px;max-height:460px;overflow-y:auto;font-size:11.5px;color:var(--t2);line-height:1.7;white-space:pre-wrap;border:1px solid var(--bd)}
.pdf-upload{border:2px dashed var(--bd);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.pdf-upload:hover{border-color:var(--pri);background:var(--plt)}
.pdf-upload-ico{font-size:28px;margin-bottom:8px}
.pdf-upload p{font-size:12.5px;color:var(--t2)}
.pdf-upload small{font-size:11px;color:var(--t3)}
/* UTIL */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px;color:var(--t3)}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--t3)}
.empty-ico{font-size:30px;margin-bottom:7px}
@keyframes fd{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fe{animation:fd .22s ease forwards}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:16px;text-align:center;grid-column:1/-1}
.err-box p{font-size:12.5px;color:#991B1B;margin-bottom:6px}
.err-link{font-size:12px;color:#1D4ED8;text-decoration:underline;cursor:pointer}
.badge-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.id-preview{font-size:11px;color:var(--pri);background:var(--plt);border-radius:5px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-weight:600;margin-top:4px;display:inline-block}
.toast{position:fixed;bottom:20px;right:20px;padding:9px 15px;border-radius:8px;font-size:12.5px;font-weight:500;z-index:2000;pointer-events:none;display:flex;align-items:center;gap:6px}
.toast.ok{background:#111;color:#fff}
.toast.err{background:#991B1B;color:#fff}
.linked-prop{font-size:11px;color:var(--pdk);background:var(--plt);border-radius:5px;padding:2px 8px;margin-top:5px;display:inline-block}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-logo">
    <div class="sb-icon">🏠</div>
    <div class="sb-name">房地產 CRM</div>
    <div class="sb-sub">Carl Wu</div>
  </div>
  <nav class="nav">
    <div class="ni on" onclick="nav('dash',this)"><span>◉</span>儀表板<span class="ni-cnt" id="bc-d">—</span></div>
    <div class="ni" onclick="nav('clients',this)"><span>👤</span>客戶<span class="ni-cnt" id="bc-c">0</span></div>
    <div class="ni" onclick="nav('props',this)"><span>🏠</span>房源<span class="ni-cnt" id="bc-pr">0</span></div>
    <div class="ni" id="alert-ni" style="display:none" onclick="nav('dash',this)"><span>🔔</span>今日提醒<span class="ni-cnt ni-alert" id="bc-alert">0</span></div>
  </nav>
  <div class="sb-foot">
    <div class="sync" onclick="loadAll()"><div class="dot"></div><span id="sync-lbl">連結中…</span></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="pg-title" id="pg-title">儀表板</div>
    <div class="srch-wrap"><span class="srch-ic">⌕</span><input class="srch" id="srch" placeholder="搜尋…" oninput="onSearch(this.value)"></div>
    <div class="icn-btn" onclick="loadAll()" title="重新整理">↻</div>
    <button class="sec-btn" id="pdf-btn" style="display:none" onclick="openPDFModal()">📄 匯入物調表</button>
    <button class="add-btn" id="add-btn" onclick="openAdd()">＋ 新增客戶</button>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="page on" id="page-dash">
      <div id="alert-strip"></div>
      <div class="kpi-grid" id="kpis"></div>
      <div class="sec-hd"><div class="sec-title">客戶進度看板</div></div>
      <div class="kanban-wrap"><div class="kanban" id="kanban"></div></div>
    </div>

    <!-- CLIENTS -->
    <div class="page" id="page-clients">
      <div class="tabs" id="c-type-tabs">
        <div class="tab on" onclick="fC('type','all',this)">全部</div>
        <div class="tab" onclick="fC('type','買方',this)">買方 B</div>
        <div class="tab" onclick="fC('type','賣方',this)">賣方 H</div>
        <div class="tab" onclick="fC('type','租客',this)">租客 R</div>
        <div class="tab" onclick="fC('type','房東',this)">房東 RE</div>
      </div>
      <div class="tabs" id="c-stage-tabs">
        <div class="tab on" onclick="fC('stage','all',this)">所有進度</div>
        <div class="tab" onclick="fC('stage','詢問',this)">詢問</div>
        <div class="tab" onclick="fC('stage','帶看中',this)">帶看中</div>
        <div class="tab" onclick="fC('stage','議價',this)">議價</div>
        <div class="tab" onclick="fC('stage','簽約',this)">簽約</div>
        <div class="tab" onclick="fC('stage','成交',this)">成交</div>
      </div>
      <div class="sec-hd"><div class="sec-title">客戶列表</div><div class="sec-cnt" id="c-cnt">0 位</div></div>
      <div id="clients-box" class="cg"></div>
    </div>

    <!-- PROPERTIES -->
    <div class="page" id="page-props">
      <div class="tabs" id="pr-cat-tabs">
        <div class="tab on" onclick="fPr('all',this)">全部</div>
        <div class="tab" onclick="fPr('自有物件',this)">🔑 自有物件</div>
        <div class="tab" onclick="fPr('集團配件',this)">🏢 集團配件</div>
        <div class="tab" onclick="fPr('委託中',this)">委託中</div>
        <div class="tab" onclick="fPr('已售出',this)">已售出</div>
      </div>
      <div class="sec-hd"><div class="sec-title">房源列表</div><div class="sec-cnt" id="pr-cnt">0 筆</div></div>
      <div id="props-box" class="cg"></div>
    </div>
  </div>
</div>

<!-- CLIENT MODAL -->
<div class="overlay" id="c-ov" onclick="if(event.target===this)closeModal('c')">
  <div class="modal">
    <div class="modal-hd">
      <div><div class="modal-title" id="c-modal-title">新增客戶</div><div id="c-id-preview" class="id-preview" style="display:none"></div></div>
      <button class="modal-close" onclick="closeModal('c')">✕</button>
    </div>
    <input type="hidden" id="c-row">
    <div class="f-2col">
      <div class="f-row"><label>姓名 *</label><input id="c-name" placeholder="王大明" oninput="updateIdPreview()"></div>
      <div class="f-row"><label>電話</label><input id="c-phone" placeholder="0912-345-678"></div>
    </div>
    <div class="f-2col">
      <div class="f-row"><label>身份 *</label>
        <select id="c-type" onchange="updateIdPreview()">

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SID='1fjdZenbl-kyYwLPSLLW4D7OF_6eoBaULpVIkdFXhoxE';
const ASCRIPT='https://script.google.com/macros/s/AKfycbzgnokhPITRj4im48Pk6N-DHFtXErJKFbBt1deO_au_lN6eDwJYkbK9PK3GxIKQhIhx/exec';
const SURL=`https://docs.google.com/spreadsheets/d/${SID}/edit`;

let D={c:[],pr:[]};
let CF={type:'all',stage:'all'};
let PR_F='all';
let CUR='dash';

// ── FETCH ──
async function fetchSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&range=A2:S500&headers=1`;
  const r=await fetch(url);
  const t=await r.text();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');
  const j=JSON.parse(t.slice(s,e+1));
  if(j.status!=='ok') throw new Error();
  const cols=j.table.cols.map(c=>c.label);
  return j.table.rows
    .filter(r=>r&&r.c&&r.c[0]&&r.c[0].v!=null)
    .filter(r=>!String(r.c[0].v).startsWith('💡'))
    .filter(r=>!['客戶ID','房源ID'].includes(String(r.c[0].v)))
    .map((r,ri)=>{
      const o={_row:ri+3};
      (r.c||[]).forEach((cell,i)=>{if(cols[i])o[cols[i].trim()]=cell&&cell.v!=null?String(cell.v):'';});
      return o;
    }).filter(r=>Object.values(r).some((v,i)=>i>0&&v));
}

async function loadAll(){
  document.getElementById('sync-lbl').textContent='同步中…';
  try{
    const sheets=['客戶總表','房源總表'];
    const [c,pr]=await Promise.all(sheets.map(fetchSheet));
    D={c,pr};
    document.getElementById('bc-c').textContent=c.length;
    document.getElementById('bc-pr').textContent=pr.length;
    const alerts=getAlerts();
    document.getElementById('bc-d').textContent=c.length+pr.length;
    if(alerts.length){
      document.getElementById('bc-alert').textContent=alerts.length;
      document.getElementById('alert-ni').style.display='flex';
    }
    document.getElementById('sync-lbl').textContent='已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    renderCur();
  }catch(e){
    document.getElementById('sync-lbl').textContent='⚠ 同步失敗';
    showErr();
  }
}

// ── ALERTS ──
function getAlerts(){
  const alerts=[];
  const today=new Date(); today.setHours(0,0,0,0);
  const yest=new Date(today); yest.setDate(yest.getDate()-1);
  // Showing 1 day ago → ask opinion
  D.pr.forEach(p=>{
    if(!p['帶看日期']||!p['推薦給']) return;
    const sd=new Date(p['帶看日期']); sd.setHours(0,0,0,0);
    if(sd.getTime()===yest.getTime()){
      const client=D.c.find(c=>c['客戶ID']===p['推薦給']||c['姓名']===p['推薦給']);
      alerts.push({type:'showing',msg:`帶看完隔天提醒：詢問 ${client?client['姓名']:p['推薦給']} 對「${p['地址']||''}」的意見`,row:p._row,clientRow:client?client._row:null});
    }
  });
  // 14 days no contact
  D.c.forEach(cl=>{
    if(!cl['上次聯絡']||['成交','暫緩'].includes(cl['目前進度'])) return;
    const lc=new Date(cl['上次聯絡']); lc.setHours(0,0,0,0);
    const diff=Math.floor((today-lc)/(1000*60*60*24));
    if(diff>=14) alerts.push({type:'stale',msg:`${cl['姓名']} 已 ${diff} 天未聯絡（${cl['目前進度']}）`,row:cl._row});
  });
  return alerts;
}

// ── RENDER ──
function renderCur(){
  if(CUR==='dash') renderDash();
  else if(CUR==='clients') renderC();
  else if(CUR==='props') renderPr();
}

function renderDash(){
  const{c,pr}=D;
  const active=c.filter(x=>x['目前進度']&&!['成交','暫緩'].includes(x['目前進度'])).length;
  const done=c.filter(x=>x['目前進度']==='成交').length;
  const listed=pr.filter(x=>x['狀態']==='委託中').length;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi green fe"><div class="kpi-lbl">總客戶數</div><div class="kpi-val">${c.length}</div><div class="kpi-note">已建立聯絡</div></div>
    <div class="kpi fe" style="animation-delay:.05s"><div class="kpi-lbl">進行中</div><div class="kpi-val" style="color:var(--pri)">${active}</div><div class="kpi-note">積極跟進中</div></div>
    <div class="kpi fe" style="animation-delay:.1s"><div class="kpi-lbl">本月成交</div><div class="kpi-val" style="color:var(--acc)">${done}</div><div class="kpi-note">已完成</div></div>
    <div class="kpi fe" style="animation-delay:.15s"><div class="kpi-lbl">委託房源</div><div class="kpi-val" style="color:#7C3AED">${listed}</div><div class="kpi-note">物件中</div></div>`;
  // Alerts
  const alerts=getAlerts();
  const ab=document.getElementById('alert-strip');
  if(alerts.length){
    ab.innerHTML=`<div class="alert-box"><div class="alert-title">🔔 今日提醒（${alerts.length}）</div>${alerts.map(a=>`<div class="alert-item" onclick="${a.clientRow?`openEditC(${a.clientRow})`:''}">⚡ ${a.msg}</div>`).join('')}</div>`;
  } else {
    ab.innerHTML='';
  }
  // Kanban
  const stages=['詢問','帶看中','議價','簽約','成交'];
  const cols=stages.map(st=>{
    const cards=c.filter(x=>x['目前進度']===st);
    return`<div class="kb-col">
      <div class="kb-hd">${st}<span class="kb-cnt">${cards.length}</span></div>
      ${cards.map(cl=>{
        const[bg,fg]=av(cl['姓名']);
        const prop=cl['推薦房源']?D.pr.find(p=>p['房源ID']===cl['推薦房源']||p['地址']===cl['推薦房源']):null;
        return`<div class="kb-card" onclick="openEditC(${cl._row})">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <div class="av" style="width:24px;height:24px;border-radius:6px;background:${bg};color:${fg};font-size:10px;flex-shrink:0">${(cl['姓名']||'?')[0]}</div>
            <div class="kb-name">${cl['姓名']}</div>
            <span class="bdg ${cBdg(cl['身份'])}" style="margin-left:auto">${idPrefix(cl['身份'])}</span>
          </div>
          <div class="kb-info">${cl['預算（萬）']?'預算 '+cl['預算（萬）']+'萬':''} ${cl['需求地段']?'・'+cl['需求地段']:''}</div>
          ${prop?`<div class="linked-prop" style="margin-top:4px;font-size:10px">🏠 ${prop['地址']||'已連結房源'}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('kanban').innerHTML=cols.join('');
}

const STAGES=['詢問','帶看中','議價','簽約','成交','貸款中','交屋','暫緩'];
const STAGE_PCT={詢問:10,帶看中:30,議價:50,簽約:70,貸款中:80,交屋:90,成交:100,暫緩:0};
const avP=[['#DBEAFE','#1D4ED8'],['#D1FAE5','#065F46'],['#FEF3C7','#92400E'],['#FCE7F3','#9D174D'],['#EDE9FE','#4C1D95'],['#FEE2E2','#991B1B'],['#E0F2FE','#0C4A6E'],['#ECFDF5','#14532D']];
const av=n=>avP[(n||'').charCodeAt(0)%avP.length];
const cBdg=t=>({買方:'b-buy',賣方:'b-sell',租客:'b-rent',房東:'b-land',投資客:'b-inv'}[t]||'b-buy');
const idPrefix=t=>({買方:'B',賣方:'H',租客:'R',房東:'RE',投資客:'I'}[t]||'?');
const prBdg=s=>({委託中:'b-list',已售出:'b-sold',已出租:'b-rented',已下架:'b-rm',觀察中:'b-q'}[s]||'b-q');
const catBdg=c=>c==='自有物件'?'b-own':'b-grp';

function filterClients(){
  let data=D.c;
  if(CF.type!=='all') data=data.filter(x=>x['身份']===CF.type);
  if(CF.stage!=='all') data=data.filter(x=>x['目前進度']===CF.stage);
  return data;
}

function renderC(){
  const data=filterClients();
  document.getElementById('c-cnt').textContent=data.length+' 位';
  if(!data.length){document.getElementById('clients-box').innerHTML='<div class="empty"><div class="empty-ico">👤</div><div>沒有符合的客戶</div></div>';return;}
  document.getElementById('clients-box').innerHTML=data.map((cl,i)=>{
    const[bg,fg]=av(cl['姓名']);
    const pct=STAGE_PCT[cl['目前進度']]||0;
    const prop=cl['推薦房源']?D.pr.find(p=>p['房源ID']===cl['推薦房源']||p['地址']===cl['推薦房源']):null;
    return`<div class="cc fe" style="animation-delay:${i*.03}s" onclick="openEditC(${cl._row})">
      <div class="edit-hint">點擊編輯</div>
      <div class="c-top">
        <div class="av" style="background:${bg};color:${fg}">${(cl['姓名']||'?')[0]}</div>
        <div style="flex:1">
          <div class="badge-row">
            <span class="bdg ${cBdg(cl['身份'])}">${cl['身份']||''}</span>
            <span class="tag">${cl['目前進度']||'詢問'}</span>
          </div>
          <div class="c-name">${cl['姓名']||''}</div>
          <div class="c-id">${cl['客戶ID']||''}</div>
        </div>
      </div>
      <div class="divid"></div>
      <div class="crow"><span class="crow-ico">📞</span><span class="crow-lbl">電話</span><span class="crow-val">${cl['電話']||'—'}</span></div>
      <div class="crow"><span class="crow-ico">💰</span><span class="crow-lbl">預算</span><span class="crow-val" style="color:var(--pdk)">${cl['預算（萬）']?cl['預算（萬）']+' 萬':'—'}</span></div>
      <div class="crow"><span class="crow-ico">📍</span><span class="crow-lbl">地段</span><span class="crow-val">${cl['需求地段']||'—'}</span></div>
      ${cl['聯絡紀錄']?`<div class="crow"><span class="crow-ico">💬</span><span style="font-size:10.5px;color:var(--t3);line-height:1.45">${cl['聯絡紀錄'].slice(0,40)}${cl['聯絡紀錄'].length>40?'…':''}</span></div>`:''}
      ${prop?`<div class="linked-prop">🏠 已推薦：${prop['地址']||'房源'}</div>`:''}
      <div class="stage-bar"><div class="stage-fill" style="width:${pct}%"></div></div>
      <div class="stage-txt"><span>${cl['目前進度']||'詢問'}</span><span>${pct}%</span></div>
    </div>`;
  }).join('');
}

function fC(dim,val,el){
  if(dim==='type'){
    document.querySelectorAll('#c-type-tabs .tab').forEach(t=>t.classList.remove('on'));
    CF.type=val;
  } else {
    document.querySelectorAll('#c-stage-tabs .tab').forEach(t=>t.classList.remove('on'));
    CF.stage=val;
  }
  el.classList.add('on');
  renderC();
}

function renderPr(){
  let data=D.pr;
  if(PR_F!=='all'){
    if(['自有物件','集團配件'].includes(PR_F)) data=data.filter(x=>x['類別']===PR_F);
    else data=data.filter(x=>x['狀態']===PR_F);
  }
  document.getElementById('pr-cnt').textContent=data.length+' 筆';

// ── SMART ID ──
function generateId(type){
  const prefix={買方:'B',賣方:'H',租客:'R',房東:'RE',投資客:'I'}[type]||'C';
  const now=new Date();
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const roc=now.getFullYear()-1911;
  const dateStr=mm+dd+roc;
  const existing=D.c.filter(c=>(c['客戶ID']||'').includes(dateStr)).length;
  return prefix+dateStr+String(existing+1).padStart(3,'0');
}

function generatePropId(){
  const now=new Date();
  const mm=String(now.getMonth()+1).padStart(2,'0');
  const dd=String(now.getDate()).padStart(2,'0');
  const roc=now.getFullYear()-1911;
  const dateStr='P'+mm+dd+roc;
  const existing=D.pr.filter(p=>(p['房源ID']||'').includes(mm+dd+roc)).length;
  return dateStr+String(existing+1).padStart(3,'0');
}

// ── PDF ──
function resetPDFModal(){
  document.getElementById('pdf-step1').style.display='block';
  document.getElementById('pdf-step2').style.display='none';
  document.getElementById('pdf-step3').style.display='none';
  document.getElementById('pdf-err').style.display='none';
  document.getElementById('pdf-file').value='';
}

async function loadPDF(file){
  if(!file)return;
  document.getElementById('pdf-step1').style.display='none';
  document.getElementById('pdf-step2').style.display='block';
  document.getElementById('pdf-step3').style.display='none';
  document.getElementById('pdf-err').style.display='none';

  try{
    // Step 1: Extract text from PDF using pdf.js (browser-side)
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument(ab).promise;
    let pdfText='';
    for(let i=1;i<=Math.min(pdf.numPages,3);i++){
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      pdfText+=tc.items.map(item=>item.str).join(' ')+'\n';
    }
    if(!pdfText.trim()) throw new Error('無法從PDF擷取文字，請確認PDF非純掃描檔');

    // Step 2: Send text to Apps Script → Gemini (server-side, API key is hidden)
    const res=await fetch(ASCRIPT,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'parsePdfWithAI', pdfText:pdfText})
    });
    const result=await res.json();
    if(result.status!=='ok') throw new Error(result.message||'AI解析失敗');

    const d=result.data;
    console.log('Gemini回傳資料:', JSON.stringify(d));

    // 正規表達式補抓Gemini漏掉的欄位
    function reFind(text, re) { const m=text.match(re); return (m&&m[1])?m[1].trim():''; }
    const t = pdfText.replace(/\s+/g,' ');
    if(!d.buildingArea) d.buildingArea = reFind(t, /建物登記 *([\d.]+) *坪/);
    if(!d.landArea)     d.landArea     = reFind(t, /土地登記 *([\d.]+) *坪/);
    if(!d.age)          d.age          = reFind(t, /屋齡 *([\d.]+) *年/);
    if(!d.structure)    d.structure    = reFind(t, /建物結構 *([\u4e00-\u9fa5\(\)A-Za-z]+)/);
    if(!d.parking)      d.parking      = reFind(t, /停車空間 *([^\s]+)/);
    if(!d.direction)    d.direction    = reFind(t, /朝向 *([東西南北]+)/);
    if(!d.floor)        d.floor        = reFind(t, /樓層 *([^\u3000\n]{2,20})/);
    if(!d.agentName)    d.agentName    = reFind(t, /列印人[：:] *([^\s　]+)/);
    if(!d.agentPhone)   d.agentPhone   = reFind(t, /([0-9]{4}[-]?[0-9]{3}[-]?[0-9]{4})/);
    console.log('補充後:', JSON.stringify({buildingArea:d.buildingArea,landArea:d.landArea,age:d.age,structure:d.structure}));

    const typeMap={透天:'住宅',公寓:'住宅',大樓:'住宅',套房:'套房',商辦:'商辦',店面:'店面',土地:'土地',廠辦:'廠辦'};

    if(d.address) document.getElementById('pdf-addr').value=d.address;
    if(d.type){const m=Object.entries(typeMap).find(([k])=>d.type.includes(k));if(m)document.getElementById('pdf-type').value=m[1];}
    if(d.buildingArea){const n=parseFloat(String(d.buildingArea).replace(/[^\d.]/g,''));if(!isNaN(n)&&n<500)document.getElementById('pdf-size').value=n;}
    if(d.layout) document.getElementById('pdf-layout').value=d.layout;
    if(d.totalPrice){const n=parseFloat(String(d.totalPrice).replace(/[^\d.]/g,''));if(!isNaN(n))document.getElementById('pdf-price').value=n;}
    if(d.landArea){const n=parseFloat(String(d.landArea).replace(/[^\d.]/g,''));if(!isNaN(n)&&n<500)document.getElementById('pdf-land').value=n;}
    if(d.agentName) document.getElementById('pdf-owner').value=d.agentName;
    if(d.agentPhone) document.getElementById('pdf-ownertel').value=d.agentPhone;
    const parts=[];
    if(d.features) parts.push(d.features);
    if(d.floor) parts.push('樓層：'+d.floor);
    if(d.direction) parts.push('朝向：'+d.direction);
    if(d.age) parts.push('屋齡：'+d.age+'年');
    if(d.structure) parts.push('結構：'+d.structure);
    if(d.parking) parts.push('停車：'+d.parking);
    if(d.propId) parts.push('物件編號：'+d.propId);
    if(parts.length) document.getElementById('pdf-notes').value=parts.join('\n');

    document.getElementById('pdf-step2').style.display='none';
    document.getElementById('pdf-step3').style.display='block';

  }catch(err){
    document.getElementById('pdf-step2').style.display='none';
    document.getElementById('pdf-err').style.display='block';
    document.getElementById('pdf-err-msg').textContent='解析失敗：'+err.message;
  }
}
