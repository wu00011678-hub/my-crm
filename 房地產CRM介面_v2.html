<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>房地產 CRM — Carl Wu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F2ED;--sidebar:#0C1A10;--primary:#1D9E75;--primary-dk:#0F6E56;
  --primary-lt:#E1F5EE;--accent:#EF9F27;--card:#FFFFFF;--t1:#111827;
  --t2:#4B5563;--t3:#9CA3AF;--bd:#E5E1D8;
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 18px rgba(0,0,0,.07);
  --sh-h:0 6px 12px rgba(0,0,0,.07),0 16px 48px rgba(0,0,0,.13);--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden;font-size:14px}
.sb{width:215px;min-width:215px;background:var(--sidebar);display:flex;flex-direction:column;padding:22px 0;height:100vh}
.sb-logo{padding:0 18px 22px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:10px}
.sb-icon{width:38px;height:38px;background:var(--primary);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.sb-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:#F9FAFB}
.sb-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;font-weight:300}
.nav{flex:1;padding:4px 10px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:rgba(255,255,255,.5);cursor:pointer;margin-bottom:2px;transition:all .18s;user-select:none;font-size:13px;position:relative}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);transform:translateX(2px)}
.ni.on{background:rgba(29,158,117,.18);color:#6EE7B7;font-weight:500}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--primary);border-radius:0 3px 3px 0}
.ni-ico{font-size:15px;width:20px;text-align:center}
.ni-cnt{margin-left:auto;background:rgba(255,255,255,.09);color:rgba(255,255,255,.45);font-size:11px;padding:1px 7px;border-radius:20px}
.ni.on .ni-cnt{background:rgba(110,231,183,.15);color:#6EE7B7}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.06)}
.sync{display:flex;align-items:center;gap:8px;font-size:11.5px;color:rgba(255,255,255,.3);cursor:pointer;transition:color .15s;padding:4px 0}
.sync:hover{color:rgba(255,255,255,.6)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:18px 26px 0;display:flex;align-items:center;gap:10px}
.topbar-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:var(--t1);flex:1}
.srch-wrap{position:relative}
.srch{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:7px 11px 7px 32px;font-size:13px;color:var(--t1);width:190px;outline:none;transition:all .2s;font-family:'DM Sans',sans-serif}
.srch:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,158,117,.1);width:220px}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
.icn-btn{width:34px;height:34px;border-radius:9px;background:var(--card);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:15px;color:var(--t2)}
.icn-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-lt)}
.icn-btn:active{transform:scale(.92)}
.add-btn{padding:7px 16px;border-radius:10px;background:var(--primary);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.add-btn:hover{background:var(--primary-dk)}
.add-btn:active{transform:scale(.96);box-shadow:inset 0 2px 6px rgba(0,0,0,.18)}
.content{flex:1;overflow-y:auto;padding:14px 26px 28px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.page{display:none}.page.on{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .22s}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh-h)}
.kpi-lbl{font-size:11px;color:var(--t3);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.kpi-val{font-size:30px;font-weight:600;line-height:1;color:var(--t1)}
.kpi-note{font-size:11px;color:var(--t3);margin-top:6px}
.kpi.green{background:var(--primary);border-color:var(--primary-dk)}
.kpi.green .kpi-lbl{color:rgba(255,255,255,.6)}.kpi.green .kpi-val{color:#fff}.kpi.green .kpi-note{color:rgba(255,255,255,.5)}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:var(--t1)}
.sec-cnt{font-size:11px;color:var(--t3);background:var(--bg);border:1px solid var(--bd);border-radius:20px;padding:1px 8px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.cc{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .22s;cursor:pointer}
.cc:hover{transform:translateY(-4px);box-shadow:var(--sh-h);border-color:rgba(29,158,117,.18)}
.cc:active{transform:translateY(-1px)}
.c-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;flex-shrink:0}
.c-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;color:var(--t1);line-height:1.3}
.c-id{font-size:10.5px;color:var(--t3);margin-top:2px}
.divid{height:1px;background:var(--bd);margin-bottom:10px;opacity:.7}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px}
.crow-ico{color:var(--t3);font-size:12px;width:15px}
.crow-lbl{color:var(--t3);min-width:36px}
.crow-val{color:var(--t2);font-weight:500}
.bdg{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.b-buy{background:#EFF6FF;color:#1D4ED8}.b-sell{background:#FFF7ED;color:#C2410C}
.b-rent{background:#F0FDF4;color:#15803D}.b-land{background:#FAF5FF;color:#7C3AED}
.b-inv{background:#FFF1F2;color:#BE123C}.b-inq{background:#F3F4F6;color:#6B7280}
.b-view{background:#EFF6FF;color:#1D4ED8}.b-neg{background:#FFFBEB;color:#B45309}
.b-sign{background:#F0FDF4;color:#15803D}.b-loan{background:#E0F2FE;color:#0369A1}
.b-close{background:#ECFDF5;color:#065F46}.b-done{background:#DCFCE7;color:#14532D}
.b-pause{background:#F9FAFB;color:#9CA3AF}.b-list{background:#EFF6FF;color:#1D4ED8}
.b-sold{background:#DCFCE7;color:#14532D}.b-rented{background:#FAF5FF;color:#7C3AED}
.b-rm{background:#F3F4F6;color:#9CA3AF}
.tag{font-size:11px;padding:2px 7px;border-radius:5px;border:1px solid var(--bd);color:var(--t2);background:var(--bg)}
.pl{display:flex;flex-direction:column;gap:9px}
.pi{background:var(--card);border-radius:var(--r);padding:13px 17px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .2s;cursor:pointer}
.pi:hover{transform:translateX(5px);box-shadow:var(--sh-h);border-color:rgba(29,158,117,.2)}
.pi:active{transform:translateX(2px)}
.pi-name{font-family:'Noto Serif TC',serif;font-size:13.5px;font-weight:600;color:var(--t1);min-width:72px}
.pi-note{font-size:12px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prob-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:72px}
.prob-bar{width:60px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prob-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .9s ease}
.prob-txt{font-size:10.5px;color:var(--t3)}
.pi-date{font-size:11px;color:var(--t3);text-align:right;min-width:80px}
.pi-date b{display:block;color:var(--t2);font-weight:500}
.pc{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7);transition:all .22s;cursor:pointer}
.pc:hover{transform:translateY(-4px);box-shadow:var(--sh-h)}
.p-addr{font-family:'Noto Serif TC',serif;font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.45;margin-bottom:9px}
.p-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.chip{font-size:11.5px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:3px 8px;color:var(--t2)}
.p-price{font-size:20px;font-weight:600;color:var(--primary-dk);font-family:'DM Sans',sans-serif}
.p-unit{font-size:11.5px;color:var(--t3);font-weight:400}
.tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:5px 13px;border-radius:8px;font-size:12.5px;border:1px solid var(--bd);background:var(--card);color:var(--t2);cursor:pointer;transition:all .15s;user-select:none}
.tab:hover{border-color:var(--primary);color:var(--primary)}
.tab.on{background:var(--primary);border-color:var(--primary);color:#fff}
.tab:active{transform:scale(.96)}
.dash-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dcard{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid rgba(229,225,216,.7)}
.dcard-ttl{font-size:12.5px;font-weight:500;color:var(--t2);margin-bottom:12px}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.srow-nm{font-size:12px;color:var(--t2);min-width:65px}
.srow-bar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.srow-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .8s ease}
.srow-n{font-size:11.5px;color:var(--t3);min-width:18px;text-align:right}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:10px;color:var(--t3)}
.spin{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-ico{font-size:36px;margin-bottom:10px}
@keyframes fd{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fe{animation:fd .28s ease forwards}
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);padding:20px;text-align:center}
.err-box p{font-size:13px;color:#991B1B;margin-bottom:8px}
.err-link{font-size:12px;color:#1D4ED8;text-decoration:underline;cursor:pointer}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:center;justify-content:center;z-index:1000}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:18px;padding:28px 28px 24px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;animation:fd .22s ease;box-shadow:0 24px 80px rgba(0,0,0,.22)}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:var(--t1)}
.modal-close{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:15px;transition:all .15s;background:var(--bg);border:none}
.modal-close:hover{background:var(--bd);color:var(--t1)}
.f-row{margin-bottom:14px}
.f-row label{display:block;font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px;letter-spacing:.03em}
.f-row input,.f-row select,.f-row textarea{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:9px;font-size:13px;color:var(--t1);background:var(--bg);outline:none;transition:all .18s;font-family:'DM Sans',sans-serif;appearance:none}
.f-row input:focus,.f-row select:focus,.f-row textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,158,117,.1);background:#fff}
.f-row textarea{resize:vertical;min-height:68px}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd)}
.btn-cancel{padding:8px 18px;border-radius:9px;background:var(--bg);border:1px solid var(--bd);color:var(--t2);font-size:13px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-cancel:hover{border-color:var(--t3);color:var(--t1)}
.btn-sub{padding:9px 22px;border-radius:9px;background:var(--primary);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.btn-sub:hover{background:var(--primary-dk)}
.btn-sub:active{transform:scale(.96);box-shadow:inset 0 2px 5px rgba(0,0,0,.15)}
.btn-sub:disabled{opacity:.6;cursor:not-allowed;transform:none}
.setup-banner{background:var(--primary-lt);border:1px solid rgba(29,158,117,.25);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12.5px;color:var(--primary-dk);line-height:1.6}
.setup-banner b{font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:2000;animation:fd .22s ease;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.ok{background:#111;color:#fff}
.toast.err{background:#991B1B;color:#fff}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-logo">
    <div class="sb-icon">🏠</div>
    <div class="sb-name">房地產 CRM</div>
    <div class="sb-sub">Carl Wu</div>
  </div>
  <nav class="nav">
    <div class="ni on" onclick="nav('dashboard',this)">
      <span class="ni-ico">◉</span>儀表板<span class="ni-cnt" id="bc-d">—</span>
    </div>
    <div class="ni" onclick="nav('clients',this)">
      <span class="ni-ico">👤</span>客戶<span class="ni-cnt" id="bc-c">0</span>
    </div>
    <div class="ni" onclick="nav('pipeline',this)">
      <span class="ni-ico">◈</span>跟進<span class="ni-cnt" id="bc-p">0</span>
    </div>
    <div class="ni" onclick="nav('properties',this)">
      <span class="ni-ico">⊞</span>房源<span class="ni-cnt" id="bc-pr">0</span>
    </div>
  </nav>
  <div class="sb-foot">
    <div class="sync" onclick="loadAll()">
      <div class="dot"></div><span id="sync-lbl">連結 Google Sheets 中…</span>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pg-title">儀表板</div>
    <div class="srch-wrap">
      <span class="srch-ic">⌕</span>
      <input class="srch" type="text" id="srch" placeholder="搜尋客戶或物件…" oninput="onSearch(this.value)">
    </div>
    <div class="icn-btn" onclick="loadAll()" title="重新整理">↻</div>
    <button class="add-btn" onclick="openModal()">＋ 新增客戶</button>
  </div>
  <div class="content">
    <div class="page on" id="page-dashboard">
      <div class="kpi-grid" id="kpis"></div>
      <div class="dash-2col">
        <div class="dcard"><div class="dcard-ttl">👤 最近客戶</div><div id="dash-recent"><div class="loading"><div class="spin"></div></div></div></div>
        <div class="dcard"><div class="dcard-ttl">◈ 跟進階段分佈</div><div id="dash-stages"></div></div>
      </div>
    </div>
    <div class="page" id="page-clients">
      <div class="tabs" id="c-tabs">
        <div class="tab on" onclick="fC('all',this)">全部</div>
        <div class="tab" onclick="fC('買方',this)">買方</div>
        <div class="tab" onclick="fC('賣方',this)">賣方</div>
        <div class="tab" onclick="fC('租客',this)">租客</div>
        <div class="tab" onclick="fC('房東',this)">房東</div>
      </div>
      <div class="sec-hd"><div class="sec-title">客戶列表</div><div class="sec-cnt" id="c-cnt">0 位</div></div>
      <div id="clients-box" class="cg"><div class="loading"><div class="spin"></div><span>載入中…</span></div></div>
    </div>
    <div class="page" id="page-pipeline">
      <div class="tabs" id="p-tabs">
        <div class="tab on" onclick="fP('all',this)">全部</div>
        <div class="tab" onclick="fP('詢問',this)">詢問</div>
        <div class="tab" onclick="fP('帶看中',this)">帶看中</div>
        <div class="tab" onclick="fP('出價議價',this)">議價</div>
        <div class="tab" onclick="fP('簽約',this)">簽約</div>
        <div class="tab" onclick="fP('成交',this)">成交</div>
      </div>
      <div class="sec-hd"><div class="sec-title">跟進狀態</div><div class="sec-cnt" id="p-cnt">0 筆</div></div>
      <div id="pipeline-box" class="pl"><div class="loading"><div class="spin"></div><span>載入中…</span></div></div>
    </div>
    <div class="page" id="page-properties">
      <div class="tabs" id="pr-tabs">
        <div class="tab on" onclick="fPr('all',this)">全部</div>
        <div class="tab" onclick="fPr('委託中',this)">委託中</div>
        <div class="tab" onclick="fPr('已售出',this)">已售出</div>
        <div class="tab" onclick="fPr('已出租',this)">已出租</div>
        <div class="tab" onclick="fPr('已下架',this)">已下架</div>
      </div>
      <div class="sec-hd"><div class="sec-title">房源列表</div><div class="sec-cnt" id="pr-cnt">0 筆</div></div>
      <div id="properties-box" class="cg"><div class="loading"><div class="spin"></div><span>載入中…</span></div></div>
    </div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">新增客戶</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="setup-banner" id="setup-banner" style="display:none">
      <b>尚未設定 Apps Script</b> — 按下新增後會直接開啟 Google Sheets。<br>
      完成 Apps Script 設定後，即可直接在此表單新增資料。
    </div>
    <div class="f-2col">
      <div class="f-row"><label>姓名 *</label><input type="text" id="f-name" placeholder="王大明"></div>
      <div class="f-row"><label>電話</label><input type="text" id="f-phone" placeholder="0912-345-678"></div>
    </div>
    <div class="f-2col">
      <div class="f-row"><label>身份</label>
        <select id="f-type">
          <option value="">請選擇</option>
          <option>買方</option><option>賣方</option>
          <option>租客</option><option>房東</option><option>投資客</option>
        </select>
      </div>
      <div class="f-row"><label>來源</label>
        <select id="f-src">
          <option value="">請選擇</option>
          <option>Facebook 廣告</option><option>LINE 詢問</option>
          <option>591 網路</option><option>舊客轉介</option>
          <option>實價登錄</option><option>其他</option>
        </select>
      </div>
    </div>
    <div class="f-2col">
      <div class="f-row"><label>預算（萬）</label><input type="number" id="f-budget" placeholder="1500"></div>
      <div class="f-row"><label>需求坪數</label><input type="text" id="f-size" placeholder="30–40坪"></div>
    </div>
    <div class="f-row"><label>需求地段</label><input type="text" id="f-area" placeholder="信義區、大安區"></div>
    <div class="f-row"><label>LINE ID</label><input type="text" id="f-line" placeholder="line_id"></div>
    <div class="f-row"><label>備註</label><textarea id="f-notes" placeholder="補充說明…"></textarea></div>
    <div class="f-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-sub" id="f-submit" onclick="submitClient()">
        <span id="f-submit-txt">新增客戶</span>
      </button>
    </div>
  </div>
</div>

<script>
const SID = '1fjdZenbl-kyYwLPSLLW4D7OF_6eoBaULpVIkdFXhoxE';
const SURL = `https://docs.google.com/spreadsheets/d/${SID}/edit`;

// ★ 完成 Apps Script 部署後，把 URL 貼在這裡 ★
let ASCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgnokhPITRj4im48Pk6N-DHFtXErJKFbBt1deO_au_lN6eDwJYkbK9PK3GxIKQhIhx/exec';

let D={c:[],p:[],pr:[]}, cur='dashboard', cf={c:'all',p:'all',pr:'all'};

async function fetchSheet(name) {
  const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}&range=A2:N500&headers=1`;
  const r=await fetch(url);
  const t=await r.text();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');
  const j=JSON.parse(t.slice(s,e+1));
  if(j.status!=='ok') throw new Error(j.status);
  const cols=j.table.cols.map(c=>c.label);
  return j.table.rows
    .filter(r=>r&&r.c&&r.c[0]&&r.c[0].v!=null)
    .filter(r=>!String(r.c[0].v).startsWith('💡'))
    .filter(r=>!['客戶ID','房源ID'].includes(String(r.c[0].v)))
    .map(r=>{const o={};(r.c||[]).forEach((cell,i)=>{if(cols[i])o[cols[i]]=cell&&cell.v!=null?String(cell.v):'';});return o;})
    .filter(r=>Object.values(r).some(v=>v));
}

async function loadAll() {
  document.getElementById('sync-lbl').textContent='同步中…';
  try {
    const [c,p,pr]=await Promise.all([fetchSheet('客戶資料表'),fetchSheet('跟進狀態表'),fetchSheet('房源資料表')]);
    D={c,p,pr};
    document.getElementById('bc-c').textContent=c.length;
    document.getElementById('bc-p').textContent=p.length;
    document.getElementById('bc-pr').textContent=pr.length;
    document.getElementById('bc-d').textContent=c.length+p.length;
    document.getElementById('sync-lbl').textContent='已同步 · '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    renderCur();
  } catch(e) {
    document.getElementById('sync-lbl').textContent='⚠ 同步失敗 — 點此重試';
    ['clients-box','pipeline-box','properties-box'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.innerHTML=`<div class="err-box"><p>無法讀取 Google Sheets 資料</p><p style="font-size:12px;color:#6B7280;margin-bottom:10px">請確認試算表已設為「知道連結的任何人可以檢視」</p><span class="err-link" onclick="window.open('${SURL}','_blank')">開啟 Google Sheets 檢查設定</span></div>`;
    });
  }
}

function nav(page,el) {
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('page-'+page).classList.add('on');
  cur=page;
  const titles={dashboard:'儀表板',clients:'客戶管理',pipeline:'跟進狀態',properties:'房源列表'};
  document.getElementById('pg-title').textContent=titles[page];
  renderCur();
}

function renderCur(){
  if(cur==='dashboard') renderDash();
  else if(cur==='clients') renderC(cf.c);
  else if(cur==='pipeline') renderP(cf.p);
  else if(cur==='properties') renderPr(cf.pr);
}

const avP=[['#DBEAFE','#1D4ED8'],['#D1FAE5','#065F46'],['#FEF3C7','#92400E'],['#FCE7F3','#9D174D'],['#EDE9FE','#4C1D95'],['#FEE2E2','#991B1B'],['#E0F2FE','#0C4A6E'],['#ECFDF5','#14532D']];
const av=n=>avP[(n||'').charCodeAt(0)%avP.length];
const cBdg=t=>({買方:'b-buy',賣方:'b-sell',租客:'b-rent',房東:'b-land',投資客:'b-inv'}[t]||'b-inq');
const sBdg=s=>({詢問:'b-inq',帶看中:'b-view',出價議價:'b-neg',簽約:'b-sign',貸款中:'b-loan',交屋:'b-close',成交:'b-done',暫緩:'b-pause'}[s]||'b-inq');
const prBdg=s=>({委託中:'b-list',已售出:'b-sold',已出租:'b-rented',已下架:'b-rm',觀察中:'b-inq'}[s]||'b-inq');

function renderDash(){
  const {c,p,pr}=D;
  const active=p.filter(x=>x['目前階段']&&!['成交','暫緩'].includes(x['目前階段'])).length;
  const done=p.filter(x=>x['目前階段']==='成交').length;
  const listed=pr.filter(x=>x['狀態']==='委託中').length;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi green fe"><div class="kpi-lbl">總客戶數</div><div class="kpi-val">${c.length}</div><div class="kpi-note">已建立聯絡</div></div>
    <div class="kpi fe" style="animation-delay:.05s"><div class="kpi-lbl">進行中案件</div><div class="kpi-val" style="color:var(--primary)">${active}</div><div class="kpi-note">積極跟進中</div></div>
    <div class="kpi fe" style="animation-delay:.1s"><div class="kpi-lbl">成交案件</div><div class="kpi-val" style="color:var(--accent)">${done}</div><div class="kpi-note">已完成</div></div>
    <div class="kpi fe" style="animation-delay:.15s"><div class="kpi-lbl">委託房源</div><div class="kpi-val" style="color:#7C3AED">${listed}</div><div class="kpi-note">物件中</div></div>`;
  const rcHtml=c.length?c.slice(-4).reverse().map(cl=>{const[bg,fg]=av(cl['姓名']);return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)"><div class="av" style="width:32px;height:32px;border-radius:9px;background:${bg};color:${fg};font-size:12px">${(cl['姓名']||'?')[0]}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--t1);font-family:'Noto Serif TC',serif">${cl['姓名']||''}</div><div style="font-size:11px;color:var(--t3)">${cl['需求地段']||cl['來源']||''}</div></div><span class="bdg ${cBdg(cl['身份'])}">${cl['身份']||''}</span></div>`;}).join(''):'<div class="empty"><div class="empty-ico">👤</div><div>暫無客戶資料</div></div>';
  document.getElementById('dash-recent').innerHTML=rcHtml;
  const stages=['詢問','帶看中','出價議價','簽約','成交'];
  const counts=stages.map(s=>p.filter(x=>x['目前階段']===s).length);
  const mx=Math.max(...counts,1);
  document.getElementById('dash-stages').innerHTML=stages.map((s,i)=>`<div class="srow"><div class="srow-nm">${s}</div><div class="srow-bar"><div class="srow-fill" style="width:${Math.round(counts[i]/mx*100)}%"></div></div><div class="srow-n">${counts[i]}</div></div>`).join('');
}

function renderC(filter){
  const data=filter==='all'?D.c:D.c.filter(x=>x['身份']===filter);
  document.getElementById('c-cnt').textContent=data.length+' 位';
  if(!data.length){document.getElementById('clients-box').innerHTML='<div class="empty"><div class="empty-ico">👤</div><div>沒有符合的客戶</div></div>';return;}
  document.getElementById('clients-box').innerHTML=data.map((cl,i)=>{const[bg,fg]=av(cl['姓名']);return`<div class="cc fe" style="animation-delay:${i*.04}s"><div class="c-top"><div class="av" style="background:${bg};color:${fg}">${(cl['姓名']||'?')[0]}</div><div><div class="c-name">${cl['姓名']||''}</div><div class="c-id">${cl['客戶ID']||''}</div></div><div style="margin-left:auto"><span class="bdg ${cBdg(cl['身份'])}">${cl['身份']||''}</span></div></div><div class="divid"></div><div class="crow"><span class="crow-ico">📞</span><span class="crow-lbl">電話</span><span class="crow-val">${cl['電話']||'—'}</span></div><div class="crow"><span class="crow-ico">💰</span><span class="crow-lbl">預算</span><span class="crow-val" style="color:var(--primary-dk);font-weight:600">${cl['預算（萬）']?cl['預算（萬）']+' 萬':'—'}</span></div><div class="crow"><span class="crow-ico">📍</span><span class="crow-lbl">地段</span><span class="crow-val">${cl['需求地段']||'—'}</span></div><div class="crow"><span class="crow-ico">📢</span><span class="crow-lbl">來源</span><span class="tag">${cl['來源']||'—'}</span></div>${cl['備註']?`<div class="crow" style="margin-top:2px"><span class="crow-ico">💬</span><span style="font-size:11.5px;color:var(--t3);line-height:1.45">${cl['備註']}</span></div>`:''}</div>`;}).join('');
}
function fC(f,el){document.querySelectorAll('#c-tabs .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');cf.c=f;renderC(f);}

function renderP(filter){
  const data=filter==='all'?D.p:D.p.filter(x=>x['目前階段']===filter);
  document.getElementById('p-cnt').textContent=data.length+' 筆';
  if(!data.length){document.getElementById('pipeline-box').innerHTML='<div class="empty"><div class="empty-ico">◈</div><div>沒有符合的跟進記錄</div></div>';return;}
  document.getElementById('pipeline-box').innerHTML=data.map((p,i)=>{const prob=parseInt(p['成交機率%'])||0;return`<div class="pi fe" style="animation-delay:${i*.04}s"><div class="pi-name">${p['客戶姓名']||''}</div><span class="bdg ${sBdg(p['目前階段'])}">${p['目前階段']||''}</span><div class="pi-note">${p['聯絡紀錄']||p['帶看房源']||''}</div><div class="prob-wrap"><div class="prob-bar"><div class="prob-fill" style="width:${prob}%"></div></div><div class="prob-txt">${prob}% 機率</div></div><div class="pi-date"><div style="font-size:10px;color:var(--t3);margin-bottom:2px">下次跟進</div><b>${p['下次跟進']||'—'}</b></div></div>`;}).join('');
}
function fP(f,el){document.querySelectorAll('#p-tabs .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');cf.p=f;renderP(f);}

function renderPr(filter){
  const data=filter==='all'?D.pr:D.pr.filter(x=>x['狀態']===filter);
  document.getElementById('pr-cnt').textContent=data.length+' 筆';
  if(!data.length){document.getElementById('properties-box').innerHTML='<div class="empty"><div class="empty-ico">🏠</div><div>沒有符合的房源</div></div>';return;}
  document.getElementById('properties-box').innerHTML=data.map((p,i)=>`<div class="pc fe" style="animation-delay:${i*.04}s"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><div class="p-addr">${p['地址']||''}</div><span class="bdg ${prBdg(p['狀態'])}" style="margin-left:8px;flex-shrink:0">${p['狀態']||''}</span></div><div class="p-chips">${p['類型']?`<span class="chip">${p['類型']}</span>`:''}${p['坪數']?`<span class="chip">${p['坪數']} 坪</span>`:''}${p['格局']?`<span class="chip">${p['格局']}</span>`:''}</div><div style="display:flex;justify-content:space-between;align-items:flex-end"><div class="p-price">${p['開價（萬）']?parseInt(p['開價（萬）']).toLocaleString():'—'}<span class="p-unit"> 萬</span></div><div style="font-size:12px;color:var(--t3)">${p['屋主姓名']||''}</div></div></div>`).join('');
}
function fPr(f,el){document.querySelectorAll('#pr-tabs .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');cf.pr=f;renderPr(f);}

function onSearch(v){
  if(!v){renderCur();return;}
  const q=v.toLowerCase();
  if(cur==='clients'){
    const r=D.c.filter(c=>Object.values(c).some(x=>String(x).toLowerCase().includes(q)));
    document.getElementById('c-cnt').textContent=r.length+' 位';
    if(!r.length){document.getElementById('clients-box').innerHTML=`<div class="empty"><div class="empty-ico">🔍</div><div>找不到「${v}」</div></div>`;return;}
    document.getElementById('clients-box').innerHTML=r.map((cl,i)=>{const[bg,fg]=av(cl['姓名']);return`<div class="cc fe" style="animation-delay:${i*.04}s"><div class="c-top"><div class="av" style="background:${bg};color:${fg}">${(cl['姓名']||'?')[0]}</div><div><div class="c-name">${cl['姓名']||''}</div><div class="c-id">${cl['客戶ID']||''}</div></div><div style="margin-left:auto"><span class="bdg ${cBdg(cl['身份'])}">${cl['身份']||''}</span></div></div><div class="divid"></div><div class="crow"><span class="crow-ico">📞</span><span class="crow-lbl">電話</span><span class="crow-val">${cl['電話']||'—'}</span></div><div class="crow"><span class="crow-ico">💰</span><span class="crow-lbl">預算</span><span class="crow-val" style="color:var(--primary-dk)">${cl['預算（萬）']?cl['預算（萬）']+' 萬':'—'}</span></div><div class="crow"><span class="crow-ico">📍</span><span class="crow-lbl">地段</span><span class="crow-val">${cl['需求地段']||'—'}</span></div></div>`;}).join('');
  }
}

// ── MODAL ──
function openModal(){
  document.getElementById('setup-banner').style.display = ASCRIPT_URL ? 'none' : 'block';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('f-name').focus(), 100);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  ['f-name','f-phone','f-type','f-src','f-budget','f-size','f-area','f-line','f-notes'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
}

function showToast(msg,isErr){
  const t=document.createElement('div');
  t.className='toast '+(isErr?'err':'ok');
  t.textContent=(isErr?'⚠ ':' ✓ ')+msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

async function submitClient(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').style.borderColor='#E24B4A';document.getElementById('f-name').focus();return;}
  document.getElementById('f-name').style.borderColor='';

  if(!ASCRIPT_URL){
    window.open(SURL,'_blank');
    closeModal();
    showToast('已開啟 Google Sheets，請手動新增',false);
    return;
  }

  const btn=document.getElementById('f-submit');
  const txt=document.getElementById('f-submit-txt');
  btn.disabled=true; txt.textContent='新增中…';

  const data={
    sheet:'客戶資料表',
    姓名:name,
    電話:document.getElementById('f-phone').value,
    身份:document.getElementById('f-type').value,
    來源:document.getElementById('f-src').value,
    預算:document.getElementById('f-budget').value,
    需求坪數:document.getElementById('f-size').value,
    需求地段:document.getElementById('f-area').value,
    LINE_ID:document.getElementById('f-line').value,
    備註:document.getElementById('f-notes').value,
  };

  try {
    await fetch(ASCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});
    closeModal();
    showToast('客戶新增成功！');
    setTimeout(loadAll,1800);
  } catch(e){
    showToast('新增失敗，請檢查 Apps Script 設定',true);
  } finally {
    btn.disabled=false; txt.textContent='新增客戶';
  }
}

loadAll();
</script>
</body>
</html>
